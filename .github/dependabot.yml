# Dependabot — tier portafolio.
# Objetivo: mantener el repo al dia y seguro, con poco ruido.
#  - frecuencia mensual + 1 PR agrupado (minor/patch/major) en vez de goteo suelto.
#  - se ignoran los majors de dev-tooling (eslint/typescript/@types): rompen el
#    build sin aportar seguridad; solo son "estar al dia" del linter.
#  - los updates de SEGURIDAD llegan igual al instante (canal aparte, no se silencia).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-major"]
      # majors con breaking real que requieren migracion dedicada, no un bump:
      #  - next 16 + react 19: majors de framework (cambian runtime/tipos)
      #  - tailwindcss 4: mueve el plugin PostCSS a @tailwindcss/postcss
      #  - prisma 7: elimina url/directUrl del schema, obliga a prisma.config.ts
      #  - zod 4: cambia API y acopla con @hookform/resolvers v4
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@hookform/resolvers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-markdown"
        update-types: ["version-update:semver-major"]
      - dependency-name: "delay"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
